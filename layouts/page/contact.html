{{ define "main" }}
<div class="contact-page">

  {{ .Content }}

  <div class="contact-links">
    <a href="mailto:you@example.com" class="contact-link">
      <span class="contact-icon">✉️</span> you@example.com
    </a>
    <a href="https://github.com/BloodiestChapel" target="_blank" rel="noopener noreferrer" class="contact-link">
      <span class="contact-icon">🐙</span> GitHub
    </a>
    <a href="https://www.linkedin.com/in/dillon-chappell/" target="_blank" rel="noopener noreferrer" class="contact-link">
      <span class="contact-icon">💼</span> LinkedIn
    </a>
  </div>

  <hr class="contact-divider" />

  <form action="https://www.formbackend.com/f/4560ccb434f49c54" method="POST" class="contact-form">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="6" required></textarea>

    <button type="submit" class="contact-submit">Send Message</button>
  </form>

</div>

<style>
.contact-page {
  max-width: 640px;
  margin: 0 auto;
}

.contact-page > p {
  color: var(--secondary);
  margin-bottom: 1.5rem;
  line-height: 1.6;
}

.contact-links {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}

.contact-link {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.5rem 0.9rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--entry);
  color: var(--primary);
  text-decoration: none;
  font-size: 0.95rem;
  transition: border-color 0.2s ease, transform 0.15s ease;
}

.contact-link:hover {
  border-color: var(--primary);
  transform: translateY(-1px);
}

.contact-icon {
  font-size: 1rem;
}

.contact-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.5rem 0;
}

.contact-form {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.contact-form label {
  font-size: 0.85rem;
  color: var(--secondary);
  margin-top: 0.75rem;
}

.contact-form input,
.contact-form textarea {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.6rem 0.75rem;
  color: var(--content);
  font-family: inherit;
  font-size: 0.95rem;
  resize: vertical;
}

.contact-form input:focus,
.contact-form textarea:focus {
  outline: none;
  border-color: var(--primary);
}

.contact-submit {
  margin-top: 1.25rem;
  align-self: flex-start;
  background: var(--primary);
  color: var(--theme);
  border: none;
  border-radius: 6px;
  padding: 0.65rem 1.4rem;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s ease;
}

.contact-submit:hover {
  opacity: 0.85;
}

.contact-form p {
  color: var(--primary);
  font-size: 0.95rem;
}
</style>

<script>
const form = document.querySelector('.contact-form');

form.addEventListener('submit', async (event) => {
  event.preventDefault();

  const response = await fetch(form.action, {
    method: 'POST',
    body: new FormData(form),
    headers: { accept: 'application/json' },
  });

  if (response.ok) {
    form.innerHTML = '<p>Thanks! Your message has been sent.</p>';
  } else {
    form.insertAdjacentHTML('beforeend', '<p>Something went wrong — please try again.</p>');
  }
});
</script>
{{ end }}
